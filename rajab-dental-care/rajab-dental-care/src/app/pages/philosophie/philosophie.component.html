<section class="section values-section">
  <div class="container">
    <header class="section-head">
      <span class="eyebrow">Praxisphilosophie</span>
      <h3 class="h-section">Was Sie bei uns erwartet.</h3>
      <p class="lead">
        Vier Grundsätze prägen unsere Arbeit — sie machen den Unterschied
        zwischen Routine und einer Zahnmedizin, der Sie sich gerne
        anvertrauen.
      </p>
    </header>

    <div class="values-grid">
      @for (v of values; track v.title; let i = $index) {
        <article class="value-card card">
          <span class="value-num" aria-hidden="true">
            0{{ i + 1 }}
          </span>
          <h4>{{ v.title }}</h4>
          <p>{{ v.text }}</p>
        </article>
      }
    </div>
  </div>
</section>
